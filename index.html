<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
<title>UpNext — Event Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▲</text></svg>">
<link rel="apple-touch-icon" href="icon-192.png">
<noscript><style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#475569}body::after{content:"JavaScript is required to run UpNext."}</style></noscript>
<style>
/* ===== VARIABLES ===== */
:root {
  --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0;
  --text: #0f172a; --text2: #475569; --text3: #64748b;
  --accent: #6366f1; --accent-light: #eef2ff; --accent-dark: #4f46e5;
  --green: #22c55e; --green-bg: #f0fdf4; --green-border: #86efac;
  --amber: #f59e0b; --amber-bg: #fffbeb; --amber-border: #fcd34d;
  --red: #ef4444; --red-bg: #fef2f2;
  --radius: 14px; --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 4px 20px rgba(0,0,0,.08);
  --nav-h: 60px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0f172a;--surface:#1e293b;--border:#334155;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --accent:#818cf8;--accent-light:#1e1b4b;--accent-dark:#6366f1;
  --green-bg:#052e16;--green-border:#166534;
  --amber-bg:#451a03;--amber-border:#92400e;
  --red-bg:#450a0a;--shadow-lg:0 4px 20px rgba(0,0,0,.3);
}}

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font:inherit;color:var(--text)}

/* ===== LAYOUT ===== */
.app{min-height:100dvh;display:flex;flex-direction:column}
.screen{flex:1;display:flex;flex-direction:column}
.screen-center{justify-content:center;align-items:center;padding:24px;padding-top:max(24px,env(safe-area-inset-top))}
.pad{padding:16px;padding-top:max(16px,env(safe-area-inset-top))}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + 16px)}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.stack{display:flex;flex-direction:column}
.row{display:flex;align-items:center}
.between{justify-content:space-between}
.center{text-align:center}
.flex1{flex:1}

/* ===== TYPOGRAPHY ===== */
.h1{font-size:28px;font-weight:800;letter-spacing:-.5px}
.h2{font-size:20px;font-weight:700}
.h3{font-size:16px;font-weight:600}
.small{font-size:13px}.tiny{font-size:11px}
.muted{color:var(--text3)}.muted2{color:var(--text2)}
.bold{font-weight:700}

/* ===== LOGO ===== */
.logo{width:72px;height:72px;border-radius:18px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--accent),#818cf8);color:#fff;font-size:28px;font-weight:900;box-shadow:0 4px 24px rgba(99,102,241,.3)}

/* ===== BUTTONS ===== */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:var(--radius);font-weight:600;font-size:16px;transition:transform .1s,opacity .1s;width:100%;min-height:48px}
.btn:active:not(:disabled){transform:scale(.97)}
.btn:disabled{opacity:.3;cursor:default}
.btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.btn svg{width:20px;height:20px;flex-shrink:0}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active:not(:disabled){background:var(--accent-dark)}
.btn-outline{border:2px solid var(--border);color:var(--text2);background:var(--surface)}
.btn-outline:active:not(:disabled){background:var(--bg)}
.btn-sm{padding:8px 16px;font-size:14px;width:auto;border-radius:var(--radius-sm);min-height:36px}
.btn-danger{color:var(--red)}
.btn-ghost{color:var(--text3);font-size:13px;text-decoration:underline;font-weight:500;padding:8px}
.btn-ghost:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ===== CHIPS ===== */
.chip{display:inline-flex;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.chip-accent{background:var(--accent-light);color:var(--accent)}
.chip-amber{background:var(--amber-bg);color:#b45309}

/* ===== CARDS ===== */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:all .2s}
.card-green{background:var(--green-bg);border-color:var(--green-border);box-shadow:0 0 12px rgba(34,197,94,.15)}
.card-amber{background:var(--amber-bg);border-color:var(--amber-border);box-shadow:0 0 12px rgba(245,158,11,.15)}
.card-dim{opacity:.45}
.evt-badge{display:inline-flex;padding:2px 8px;border-radius:5px;background:var(--accent);color:#fff;font-size:11px;font-weight:700}

/* ===== INPUTS ===== */
.input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius);background:var(--surface);font-size:16px;outline:none;transition:border .2s}
.input:focus{border-color:var(--accent)}
.input:focus-visible{outline:none}
textarea.input{resize:none;font-family:monospace;font-size:13px;line-height:1.6}

/* ===== BOTTOM NAV ===== */
nav.nav{position:fixed;bottom:0;left:0;right:0;display:flex;border-top:1px solid var(--border);background:var(--surface);padding-bottom:env(safe-area-inset-bottom);height:var(--nav-h);z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 0;font-size:10px;font-weight:600;color:var(--text3);transition:color .15s}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}
.nav-item:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

/* ===== OVERLAY / MODAL ===== */
.overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.overlay-card{background:var(--surface);border-radius:20px;padding:28px;max-width:340px;width:100%;box-shadow:var(--shadow-lg);text-align:center;animation:slideUp .25s ease}

/* ===== TOAST ===== */
.toast{position:fixed;top:max(16px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 20px;box-shadow:var(--shadow-lg);font-size:14px;font-weight:600;animation:slideDown .25s ease;pointer-events:none}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 1.5s ease-in-out infinite}

/* ===== BIG NUMBER ===== */
.big-num{font-size:80px;font-weight:900;color:var(--accent);line-height:1;letter-spacing:-4px}
</style>
</head>
<body>
<div id="app" class="app" role="application" aria-label="UpNext Event Tracker"></div>

<script>
// ======================== STATE ========================
const S = {
  screen: 'home',
  tab: 'dashboard',
  meet: null,
  swimmers: [],
  currentEvent: 1,
  totalEvents: 0,
  ocrText: '',
  searchQuery: '',
  alertsShown: {},
  settings: { minutesPerEvent: 3, alertEventsAhead: 2 },
};

const LS = {
  save(k,v) { try { localStorage.setItem('upnext_'+k, JSON.stringify(v)); } catch(e){ console.warn('Storage full or blocked', e); } },
  load(k) { try { return JSON.parse(localStorage.getItem('upnext_'+k)); } catch(e) { console.warn('Corrupt storage key:', k); localStorage.removeItem('upnext_'+k); return null; } },
  clear() { ['meet','swimmers','currentEvent','totalEvents','settings','alertsShown'].forEach(k => localStorage.removeItem('upnext_'+k)); }
};

function persist() {
  LS.save('meet', S.meet); LS.save('swimmers', S.swimmers);
  LS.save('currentEvent', S.currentEvent); LS.save('totalEvents', S.totalEvents);
  LS.save('settings', S.settings); LS.save('alertsShown', S.alertsShown);
}

function loadState() {
  const m = LS.load('meet'); if (m) S.meet = m;
  const sw = LS.load('swimmers'); if (sw) S.swimmers = sw;
  const ce = LS.load('currentEvent'); if (ce != null) S.currentEvent = ce;
  const te = LS.load('totalEvents'); if (te) S.totalEvents = te;
  const st = LS.load('settings'); if (st) S.settings = { ...S.settings, ...st };
  const as = LS.load('alertsShown'); if (as) S.alertsShown = as;
  if (S.meet) S.screen = 'app';
}

// ======================== RENDER ========================
const $ = id => document.getElementById(id);
let _pendingFocus = null;

function render() {
  const r = { home: renderHome, review: renderReview, find: renderFind, app: renderApp }[S.screen] || renderHome;
  $('app').innerHTML = r();
  bindActions();
  // File input
  const fi = $('fileInput');
  if (fi) fi.addEventListener('change', e => { if (e.target.files[0]) handleImage(e.target.files[0]); });
  // Live search (targeted update to avoid full re-render)
  const si = $('searchInput');
  if (si) {
    si.addEventListener('input', () => {
      S.searchQuery = si.value;
      const list = $('searchResults');
      if (list) { list.innerHTML = renderSearchResults(); bindActions(list); }
      // Update done button
      const doneWrap = $('doneWrap');
      if (doneWrap) { doneWrap.innerHTML = renderDoneButton(); bindActions(doneWrap); }
    });
    if (_pendingFocus === 'search') { si.focus(); _pendingFocus = null; }
  }
  // Live textarea count
  const ta = $('ocrText');
  if (ta) {
    ta.addEventListener('input', () => {
      S.ocrText = ta.value;
      const chips = $('reviewChips');
      if (chips) chips.innerHTML = renderReviewChips();
    });
  }
}

function bindActions(root) {
  (root || document).querySelectorAll('[data-a]').forEach(el => {
    if (el._bound) return;
    el._bound = true;
    el.addEventListener('click', e => { e.preventDefault(); actions[el.dataset.a]?.(el); });
  });
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function pl(n, word) { return `${n} ${word}${n !== 1 ? 's' : ''}`; }

// ======================== ICONS ========================
function icon(name, size=20) {
  const paths = {
    camera: '<path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/>',
    edit: '<path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>',
    home: '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
    clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
    users: '<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>',
    settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>',
    plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
    chevL: '<polyline points="15 18 9 12 15 6"/>',
    chevR: '<polyline points="9 18 15 12 9 6"/>',
    back: '<polyline points="15 18 9 12 15 6"/>',
    clipboard: '<path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/>',
  };
  const sw = name === 'chevL' || name === 'chevR' || name === 'back' ? '2.5' : '2';
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths[name]||''}</svg>`;
}

// ======================== SCREENS ========================

function renderHome() {
  // Returning user with saved meet
  if (S.meet) {
    return `
    <main class="screen screen-center">
      <div class="stack gap-3 center" style="max-width:360px;width:100%">
        <div class="logo" style="margin:0 auto 8px" role="img" aria-label="UpNext logo">▲</div>
        <h1 class="h1">Welcome back</h1>
        <p class="muted" style="margin-bottom:20px">You have a meet loaded with ${pl(S.totalEvents,'event')}.</p>
        <button class="btn btn-primary" data-a="continueMeet">Continue Meet</button>
        <details style="margin-top:16px;text-align:left">
          <summary class="muted small" style="cursor:pointer;text-align:center;list-style:none">Start a new meet instead</summary>
          <div class="stack gap-2" style="margin-top:12px">
            <label class="btn btn-primary" style="cursor:pointer">
              ${icon('camera')} Scan Heat Sheet
              <input type="file" accept="image/*" capture="environment" id="fileInput" style="display:none">
            </label>
            <button class="btn btn-outline" data-a="pasteMode">${icon('edit')} Paste or type</button>
            <button class="btn btn-outline" data-a="clipboardPaste">${icon('clipboard')} Paste from clipboard</button>
          </div>
        </details>
      </div>
    </main>`;
  }

  // First-time user
  return `
  <main class="screen" style="padding:max(24px,env(safe-area-inset-top)) 20px 32px">
    <div class="stack gap-4" style="max-width:400px;margin:0 auto">

      <!-- Hero -->
      <div class="center" style="padding-top:8px">
        <div class="logo" style="margin:0 auto 16px" role="img" aria-label="UpNext logo">▲</div>
        <h1 class="h1" style="margin-bottom:6px">Never miss your<br>kid's race</h1>
        <p class="muted2" style="font-size:15px;line-height:1.4">Snap the heat sheet. Find your kid. Get a buzz when they're up.</p>
      </div>

      <!-- Primary CTA: Camera -->
      <label class="btn btn-primary" style="cursor:pointer;padding:20px;font-size:18px;gap:12px;box-shadow:0 4px 20px rgba(99,102,241,.3)">
        ${icon('camera',26)} Scan Heat Sheet
        <input type="file" accept="image/*" capture="environment" id="fileInput" style="display:none">
      </label>
      <p class="tiny muted center" style="margin-top:-8px">Point your camera at the printed roster</p>

      <!-- Alternatives -->
      <div class="stack gap-2" style="margin-top:4px">
        <div class="row gap-3" style="margin:4px 0">
          <div style="flex:1;height:1px;background:var(--border)"></div>
          <span class="tiny muted">OR</span>
          <div style="flex:1;height:1px;background:var(--border)"></div>
        </div>
        <button class="btn btn-outline" data-a="pasteMode" style="justify-content:flex-start;padding:14px 16px">
          ${icon('edit',22)}
          <div style="text-align:left;flex:1">
            <div style="font-weight:600">Paste or type the schedule</div>
            <div class="tiny muted" style="font-weight:400;margin-top:2px">From an email, PDF, or text message</div>
          </div>
        </button>
        <button class="btn btn-outline" data-a="clipboardPaste" style="justify-content:flex-start;padding:14px 16px">
          ${icon('clipboard',22)}
          <div style="text-align:left;flex:1">
            <div style="font-weight:600">Paste from clipboard</div>
            <div class="tiny muted" style="font-weight:400;margin-top:2px">If you already copied it</div>
          </div>
        </button>
      </div>

      <!-- How it works (collapsible) -->
      <details class="card" style="padding:0;margin-top:8px">
        <summary style="padding:14px 16px;cursor:pointer;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:space-between;list-style:none">
          <span>How does this work?</span>
          <span class="muted" style="font-size:12px">Tap to see</span>
        </summary>
        <div style="padding:0 16px 16px" class="stack gap-3">
          <div class="row gap-3" style="align-items:flex-start">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:13px">1</div>
            <div><div class="small bold">Snap the heat sheet</div><p class="tiny muted2" style="margin-top:2px">Take a photo of the roster posted at the pool deck, or paste the text from an email.</p></div>
          </div>
          <div class="row gap-3" style="align-items:flex-start">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:13px">2</div>
            <div><div class="small bold">Find your kid</div><p class="tiny muted2" style="margin-top:2px">Type their name. We'll pull up every event, heat, and lane they're in.</p></div>
          </div>
          <div class="row gap-3" style="align-items:flex-start">
            <div style="width:28px;height:28px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;font-size:13px">3</div>
            <div><div class="small bold">Get alerts</div><p class="tiny muted2" style="margin-top:2px">Tap the tracker as events go by. When your kid is up, your phone buzzes.</p></div>
          </div>
        </div>
      </details>

      <!-- Demo link -->
      <button class="btn-ghost center" data-a="loadDemo" style="margin-top:0">Just want to poke around? Try demo data</button>

    </div>
  </main>`;
}

function renderReviewChips() {
  const parsed = parseHeatSheet(S.ocrText);
  const evts = parsed.length;
  const swims = parsed.reduce((n,e) => n + e.heats.reduce((m,h) => m + h.swimmers.length, 0), 0);
  return `<span class="chip chip-accent">${pl(evts,'event')}</span><span class="chip chip-amber">${pl(swims,'entry','entries')}</span>`;
}

function renderReview() {
  const isEmpty = !S.ocrText.trim();
  return `
  <main class="screen pad stack gap-3">
    <div class="row gap-2">
      <button class="btn-sm" data-a="goHome" aria-label="Back" style="padding:8px 4px">${icon('back',22)}</button>
      <h2 class="h2 flex1">${isEmpty ? 'Paste the Heat Sheet' : 'Review the Schedule'}</h2>
    </div>
    <p class="small muted2" style="margin-top:-4px">
      ${isEmpty
        ? 'Paste the meet roster below. Looking for event numbers, heat numbers, and swimmer names.'
        : 'Check the text below. Edit if OCR got anything wrong, then continue.'}
    </p>
    <div id="reviewChips" class="row gap-2">${renderReviewChips()}</div>
    <textarea id="ocrText" class="input flex1" style="min-height:38vh" aria-label="Heat sheet text" placeholder="Paste the heat sheet here.

Example format:
Event 1 - Girls 25 Free
Heat 1 of 2
1 Smith, Emma  FAST  22.50
2 Johnson, Lily  WAVE  23.10">${esc(S.ocrText)}</textarea>
    <button class="btn btn-primary" data-a="confirmSchedule">${isEmpty ? 'Continue' : 'Looks Good — Find My Athlete'}</button>
    <button class="btn-ghost center" data-a="goHome">Start over</button>
  </main>`;
}

function renderSearchResults() {
  const allSw = getAllSwimmers();
  const q = S.searchQuery.toLowerCase().trim();
  const parts = q.split(/\s+/);
  const results = q.length >= 2 ? allSw.filter(s => {
    const n = s.name.toLowerCase();
    return parts.every(p => n.includes(p));
  }) : [];
  const tracked = new Set(S.swimmers.map(s => s.name));

  if (q.length < 2) return `<div class="muted center" style="padding:40px 0">Type at least 2 characters to search</div>`;
  if (results.length === 0) return `<div class="muted center" style="padding:40px 0">No matches for "${esc(q)}"</div>`;
  return results.map(s => `
    <div class="card ${tracked.has(s.name) ? 'card-green' : ''}">
      <div class="row between">
        <div>
          <div class="h3">${esc(s.name)}</div>
          <div class="small muted2">${pl(s.entries.length,'event')}: ${s.entries.map(e=>'#'+e.eventNum).join(', ')}</div>
        </div>
        ${tracked.has(s.name)

// ======================== OCR ========================
// Preprocess image: grayscale, upscale, contrast boost — dramatically
// improves Tesseract accuracy on photographed heat sheets.
async function preprocessImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try {
        // Upscale small photos so text is at least ~1800px wide (Tesseract likes big)
        const targetW = 1800;
        const scale = img.width < targetW ? targetW / img.width : 1;
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        // Grayscale + contrast boost
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const d = data.data;
        const contrast = 1.45;
        for (let i = 0; i < d.length; i += 4) {
          const gray = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
          const boosted = Math.max(0, Math.min(255, (gray - 128) * contrast + 128));
          d[i] = d[i + 1] = d[i + 2] = boosted;
        }
        ctx.putImageData(data, 0, 0);

        canvas.toBlob(blob => { URL.revokeObjectURL(url); resolve(blob); }, 'image/png');
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
    img.src = url;
  });
}

let tesseractLoaded = false;
async function handleImage(file) {
  if (!tesseractLoaded) {
    showModal('Loading OCR...', 'First scan downloads the text engine (~5 MB). Takes a moment.');
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    document.head.appendChild(s);
    await new Promise((res, rej) => { s.onload = res; s.onerror = rej; });
    tesseractLoaded = true;
    dismissCurrentAlert();
  }
  showModal('Preparing image...', 'Sharpening and boosting contrast for better OCR.');
  let processedBlob;
  try {
    processedBlob = await preprocessImage(file);
  } catch (e) {
    processedBlob = file; // fall back to raw
  }
  showModal('Reading text...', 'This takes 10-30 seconds depending on image size.');
  try {
    const worker = await Tesseract.createWorker('eng');
    // Tune for columnar printed text like heat sheets
    await worker.setParameters({
      tessedit_pageseg_mode: '4',        // Assume a single column of text of variable sizes
      preserve_interword_spaces: '1',
      user_defined_dpi: '300',
    });
    const { data: { text } } = await worker.recognize(processedBlob);
    await worker.terminate();
    dismissCurrentAlert();
    S.ocrText = cleanOcrText(text);
    S.screen = 'review';
    render();
    toast('Scan complete — check the text below for errors');
  } catch (e) {
    dismissCurrentAlert();
    showConfirm('OCR Failed', (e.message || 'Unknown error') + '\n\nTry pasting the text instead.', 'OK', null);
  }
}

// Post-process OCR output to fix common recognition errors
function cleanOcrText(text) {
  return text.split(/\r?\n/).map(line => {
    // Fix "Event O" / "Event |" etc to "Event 0/1"
    line = line.replace(/^(Event\s*#?\s*)([oOQlI|]+)(\s|$)/i, (_, p1, p2, p3) =>
      p1 + p2.replace(/[oOQ]/g, '0').replace(/[lI|]/g, '1') + p3);
    // Fix lane numbers at line start (e.g., "O Smith, Emma" → "0 Smith, Emma")
    line = line.replace(/^(\s*)([oOQlI|])(\s+[A-Z])/, (_, p1, p2, p3) =>
      p1 + (p2.match(/[oOQ]/) ? '0' : '1') + p3);
    // Remove lines that are just dashes/underscores (heat sheet separators)
    if (/^[\s\-_=]+$/.test(line)) return '';
    return line;
  }).filter(l => l.trim()).join('\n');
}

// ======================== PARSER ========================
function parseHeatSheet(text) {
  const events = [];
  let curEvent = null, curHeat = null;
  for (const raw of text.split(/\r?\n/)) {
    const line = raw.trim();
    if (!line) continue;
    const em = line.match(/^Event\s*#?\s*(\d+)\s*[-\u2013\u2014:.]\s*(.*)/i) || line.match(/^Event\s*#?\s*(\d+)\s+(.*)/i);
    if (em) { curEvent = { number:+em[1], name:em[2].trim().replace(/^[-\u2013\u2014:.\s]+/,''), heats:[] }; events.push(curEvent); curHeat=null; continue; }
    const hm = line.match(/^Heat\s*#?\s*(\d+)/i);
    if (hm && curEvent) { curHeat = { number:+hm[1], swimmers:[] }; curEvent.heats.push(curHeat); continue; }
    if (curEvent) {
      if (!curHeat) { curHeat = { number:1, swimmers:[] }; curEvent.heats.push(curHeat); }
      const s1 = line.match(/^\s*(\d{1,2})\s+([A-Za-z][A-Za-z'-]+,\s*[A-Za-z][A-Za-z'-]+)/);
      if (s1) { curHeat.swimmers.push({ lane:+s1[1], name:s1[2].trim() }); continue; }
      const s2 = line.match(/^\s*(\d{1,2})\s+([A-Z][a-z'-]+\s+[A-Z][a-z'-]+)/);
      if (s2) { curHeat.swimmers.push({ lane:+s2[1], name:s2[2].trim() }); }
    }
  }
  events.sort((a,b) => a.number - b.number);
  return events;
}

function getAllSwimmers() {
  if (!S.meet) return [];
  const map = {};
  for (const evt of S.meet)
    for (const h of evt.heats)
      for (const sw of h.swimmers) {
        if (!map[sw.name]) map[sw.name] = { name:sw.name, entries:[] };
        map[sw.name].entries.push({ eventNum:evt.number, eventName:evt.name, heat:h.number, lane:sw.lane });
      }
  return Object.values(map).sort((a,b) => a.name.localeCompare(b.name));
}

function getMyEntries() {
  const entries = [];
  for (const sw of S.swimmers)
    for (const e of sw.entries)
      entries.push({ ...e, swimmerName:sw.name });
  entries.sort((a,b) => a.eventNum - b.eventNum);
  return entries;
}

// ======================== ALERT QUEUE ========================
const alertQueue = [];
let alertShowing = false;

function queueAlert(title, body, urgent) {
  // Urgent alerts go to front of queue
  if (urgent) alertQueue.unshift({ title, body, urgent });
  else alertQueue.push({ title, body, urgent });
  if (!alertShowing) showNextAlert();
}

function showNextAlert() {
  if (alertQueue.length === 0) { alertShowing = false; return; }
  alertShowing = true;
  const { title, body, urgent } = alertQueue.shift();
  const div = document.createElement('div');
  div.className = 'overlay';
  div.id = 'currentAlert';
  div.setAttribute('role', 'alertdialog');
  div.setAttribute('aria-label', title);
  div.innerHTML = `
    <div class="overlay-card">
      <div style="font-size:36px;margin-bottom:12px">${urgent ? '\u{1F3C1}' : '\u25B2'}</div>
      <div class="h2" style="margin-bottom:8px">${esc(title)}</div>
      <div class="muted2" style="white-space:pre-line;margin-bottom:16px">${esc(body)}</div>
      <button class="btn btn-primary" style="max-width:200px;margin:0 auto" id="alertDismiss">Got it</button>
    </div>`;
  document.body.appendChild(div);
  const dismiss = () => { div.remove(); showNextAlert(); };
  div.querySelector('#alertDismiss').addEventListener('click', dismiss);
  div.addEventListener('click', e => { if (e.target === div) dismiss(); });
  if (urgent && 'vibrate' in navigator) navigator.vibrate([200,100,200,100,200]);
}

function dismissCurrentAlert() {
  const el = $('currentAlert');
  if (el) { el.remove(); alertShowing = false; showNextAlert(); }
}

// Non-blocking modal (for OCR loading etc)
function showModal(title, body) {
  dismissCurrentAlert();
  const div = document.createElement('div');
  div.className = 'overlay'; div.id = 'currentAlert';
  div.innerHTML = `<div class="overlay-card">
    <div style="font-size:36px;margin-bottom:12px">\u25B2</div>
    <div class="h2" style="margin-bottom:8px">${esc(title)}</div>
    <div class="muted2">${esc(body)}</div>
  </div>`;
  document.body.appendChild(div);
  alertShowing = true;
}

// Confirm dialog (replaces native confirm())
function showConfirm(title, body, actionLabel, onConfirm) {
  const div = document.createElement('div');
  div.className = 'overlay'; div.id = 'confirmDialog';
  div.setAttribute('role', 'alertdialog');
  div.innerHTML = `<div class="overlay-card">
    <div class="h2" style="margin-bottom:8px">${esc(title)}</div>
    <div class="muted2" style="white-space:pre-line;margin-bottom:20px">${esc(body)}</div>
    <div class="row gap-2" style="justify-content:center">
      ${onConfirm ? `<button class="btn btn-outline" id="confirmCancel" style="flex:1">Cancel</button>` : ''}
      <button class="btn ${onConfirm ? 'btn-primary' : 'btn-primary'}" id="confirmOk" style="flex:1;${!onConfirm?'max-width:200px':''}">${esc(actionLabel)}</button>
    </div>
  </div>`;
  document.body.appendChild(div);
  const close = () => div.remove();
  $('confirmOk').addEventListener('click', () => { close(); onConfirm?.(); });
  if (onConfirm) $('confirmCancel').addEventListener('click', close);
  div.addEventListener('click', e => { if (e.target === div) close(); });
}

// Toast (non-blocking, auto-dismiss)
function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const div = document.createElement('div');
  div.className = 'toast'; div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 2500);
}

function checkAlerts() {
  for (const sw of S.swimmers)
    for (const e of sw.entries) {
      const away = e.eventNum - S.currentEvent;
      const key = `${sw.name}-${e.eventNum}-${away}`;
      if (S.alertsShown[key]) continue;
      if (away === 0) { S.alertsShown[key]=1; queueAlert('NOW!', `${sw.name}\nEvent ${e.eventNum}, Heat ${e.heat}, Lane ${e.lane}\n${e.eventName}`, true); }
      else if (away === 1) { S.alertsShown[key]=1; queueAlert('UP NEXT!', `${sw.name} is next!\nEvent ${e.eventNum}, Heat ${e.heat}, Lane ${e.lane}`, true); }
      else if (away > 0 && away <= S.settings.alertEventsAhead) {
        S.alertsShown[key]=1;
        queueAlert(`${pl(away,'Event')} Away`, `${sw.name} in ~${away*S.settings.minutesPerEvent} min\nEvent ${e.eventNum}, Heat ${e.heat}, Lane ${e.lane}`, false);
      }
    }
  persist(); // persist alertsShown
}

// ======================== KEYBOARD ========================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const confirm = $('confirmDialog');
    if (confirm) { confirm.remove(); return; }
    dismissCurrentAlert();
  }
});

function pl(n, word, plural) { return `${n} ${n !== 1 ? (plural || word + 's') : word}`; }
